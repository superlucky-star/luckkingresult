<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>⚙️ Luck King Admin Panel</h2>

<label>Month</label>
<select id="month">
<option value="january">January</option>
<option value="february">February</option>
<option value="march">March</option>
<option value="april">April</option>
<option value="may">May</option>
<option value="june">June</option>
<option value="july" selected>July</option>
<option value="august">August</option>
<option value="september">September</option>
<option value="october">October</option>
<option value="november">November</option>
<option value="december">December</option>
</select>

<label>Year</label>
<input type="number" id="year" value="2026">

<label>Date</label>
<input type="number" id="date" min="1" max="31">

<label>RUDRAPUR</label>
<input type="text" id="rdpr">

<label>BILASPUR</label>
<input type="text" id="blpr">

<label>GADARPUR</label>
<input type="text" id="gdpr">

<label>DINESHPUR</label>
<input type="text" id="dnpr">

<label>Notice</label>
<input type="text" id="notice">

<br><br>

<button onclick="save()">Save Result</button>

<br><br>

<button id="logoutBtn">Logout</button>

</div>

<script type="module" src="panel.js"></script>

</body>
</html>
