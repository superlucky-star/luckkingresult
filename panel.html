<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>⚙️ Luck King Admin Panel</h2>

<label>Date</label>
<input type="number" id="date" min="1" max="31" placeholder="Enter Date">

<label>RUDRAPUR</label>
<input type="text" id="rdpr" placeholder="Enter Result">

<label>BILASPUR</label>
<input type="text" id="blpr" placeholder="Enter Result">

<label>GADARPUR</label>
<input type="text" id="gdpr" placeholder="Enter Result">

<label>DINESHPUR</label>
<input type="text" id="dnpr" placeholder="Enter Result">

<label>Notice</label>
<input type="text" id="notice" placeholder="Enter Notice">

<br><br>

<button onclick="save()">Save Result</button>

<br><br>

<button id="logoutBtn">Logout</button>

</div>

<script type="module" src="panel.js"></script>

</body>
</html>
